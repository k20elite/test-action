name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Qt 6.5.3 (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          modules: "qtmultimedia"

      - name: Configure (Release)
        shell: pwsh
        run: |
          cmake -S . -B build\release -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"

      - name: Build (Release)
        shell: pwsh
        run: |
          cmake --build build\release --config Release --parallel

      - name: Install app bundle
        shell: pwsh
        run: |
          cmake --install build\release --config Release --prefix dist

      - name: Package artifact
        shell: pwsh
        run: |
          if (Test-Path release-windows.zip) { Remove-Item release-windows.zip -Force }
          Compress-Archive -Path dist\* -DestinationPath release-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: 120fps-method-windows-release
          path: release-windows.zip
