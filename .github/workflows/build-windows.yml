name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install aqtinstall
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall

      - name: Install Qt 6.5.3 (MSVC 2022)
        shell: pwsh
        run: |
          python -m aqt install-qt windows desktop 6.5.3 win64_msvc2022_64 -m qttools qtsvg qtmultimedia qttranslations

      - name: Generate translation files
        shell: pwsh
        run: |
          C:\Qt\6.5.3\msvc2022_64\bin\lrelease.exe translations\language_en.ts -qm translations\language_en.qm
          C:\Qt\6.5.3\msvc2022_64\bin\lrelease.exe translations\language_ru.ts -qm translations\language_ru.qm

      - name: Configure (Release)
        shell: pwsh
        run: |
          cmake -S . -B build\release -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH=C:/Qt/6.5.3/msvc2022_64

      - name: Build (Release)
        shell: pwsh
        run: |
          cmake --build build\release --config Release --parallel

      - name: Install app bundle
        shell: pwsh
        run: |
          cmake --install build\release --config Release --prefix dist

      - name: Package artifact
        shell: pwsh
        run: |
          if (Test-Path release-windows.zip) { Remove-Item release-windows.zip -Force }
          Compress-Archive -Path dist\* -DestinationPath release-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 120fps-method-windows-release
          path: release-windows.zip
